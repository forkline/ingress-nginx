version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - decorder
    - dogsled
    - dupl
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - ginkgolinter
    - gocheckcompilerdirectives
    - goconst
    - gocritic
    - gocyclo
    - godox
    - goheader
    - gomoddirectives
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - govet
    - grouper
    - importas
    - ineffassign
    - loggercheck
    - makezero
    - misspell
    - musttag
    - nakedret
    - nolintlint
    - nosprintfhostport
    - prealloc
    - predeclared
    - promlinter
    - reassign
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - testableexamples
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocritic:
      enabled-checks:
        - badLock
        - badRegexp
        - badSorting
        - builtinShadowDecl
        - deferInLoop
        - dynamicFmtString
        - emptyDecl
        - evalOrder
        - externalErrorReassign
        - filepathJoin
        - nilValReturn
        - regexpPattern
        - returnAfterHttpError
        - sloppyReassign
        - sortSlice
        - sqlQuery
        - syncMapLoadAndDelete
        - truncateCmp
        - unnecessaryDefer
        - weakCond
        - equalFold
        - indexAlloc
        - preferDecodeRune
        - preferFprint
        - preferStringWriter
        - preferWriteByte
        - rangeExprCopy
        - rangeValCopy
        - sliceClear
        - boolExprSimplify
        - commentedOutImport
        - deferUnlambda
        - docStub
        - emptyFallthrough
        - exposedSyncMutex
        - hexLiteral
        - httpNoBody
        - methodExprCall
        - octalLiteral
        - preferFilepathJoin
        - redundantSprint
        - regexpSimplify
        - ruleguard
        - stringConcatSimplify
        - stringsCompare
        - timeExprSimplify
        - tooManyResultsChecker
        - typeAssertChain
        - typeDefFirst
        - unlabelStmt
        - yodaStyleExpr
        - builtinShadow
        - importShadow
        - initClause
        - nestingReduce
        - paramTypeCombine
        - ptrToRefParam
        - typeUnparen
        - unnecessaryBlock
    gocyclo:
      min-complexity: 40
    godox:
      keywords:
        - BUG
        - FIXME
        - HACK
    nolintlint:
      require-explanation: false
      require-specific: true
      allow-unused: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
