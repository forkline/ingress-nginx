---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-executables-have-shebangs
        exclude: >-
          ^(docs/user-guide/nginx-configuration/annotations(-risk)?\.md|images/.*/rootfs/Dockerfile|images/kube-webhook-certgen/README\.md)$
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
        exclude: >-
          ^(hack/boilerplate/boilerplate\.py\.txt)$
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        files: >-
          ^(\.github/workflows/.*\.(yml|yaml)|\.github/ISSUE_TEMPLATE/.*\.(yml|yaml)|\.ct\.yaml)$
  - repo: https://github.com/gruntwork-io/pre-commit
    rev: v0.1.30
    hooks:
      - id: shellcheck
        files: ^(\.github/actions/mkdocs/action\.sh)$
  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.104.7
    hooks:
      - id: renovate-config-validator
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.24.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
  - repo: https://github.com/norwoodj/helm-docs
    rev: v1.14.2
    hooks:
      - id: helm-docs
        args: ['--chart-search-root=charts']
