---
name: E2E

"on":
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'rootfs/**'
      - 'test/e2e/**'
      - 'test/e2e-image/**'
      - 'charts/**'
      - 'NGINX_BASE'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'rootfs/**'
      - 'test/e2e/**'
      - 'test/e2e-image/**'
      - 'charts/**'
      - 'NGINX_BASE'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:
    inputs:
      focus:
        description: Optional ginkgo focus pattern
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build test images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read Go version
        run: echo "GOLANG_VERSION=$(cat GOLANG_VERSION)" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GOLANG_VERSION }}
          check-latest: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare kubectl
        run: |
          curl -LO https://dl.k8s.io/release/v1.35.3/bin/linux/amd64/kubectl
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull or build nginx base image
        working-directory: images/nginx
        run: |
          TAGNGINX=$(cat TAG)
          if docker pull ghcr.io/forkline/ingress-nginx/nginx:latest; then
            docker tag ghcr.io/forkline/ingress-nginx/nginx:latest \
              ingress-nginx/nginx:${TAGNGINX}
            echo "Reused nginx base image from registry"
          else
            echo "Image not in registry, building locally..."
            docker buildx build \
              --platform linux/amd64 \
              rootfs \
              --tag ingress-nginx/nginx:${TAGNGINX} \
              --load
          fi

      - name: Pull or build kube-webhook-certgen image
        working-directory: images
        run: |
          CERTGEN_TAG=$(cat kube-webhook-certgen/TAG)
          if docker pull \
              ghcr.io/forkline/ingress-nginx/kube-webhook-certgen:latest; then
            docker tag \
              ghcr.io/forkline/ingress-nginx/kube-webhook-certgen:latest \
              ghcr.io/forkline/ingress-nginx/kube-webhook-certgen:${CERTGEN_TAG}
            echo "Reused kube-webhook-certgen from registry"
          else
            echo "Image not in registry, building locally..."
            GOLANG_VERSION=$(cat ../GOLANG_VERSION)
            docker buildx build \
              --platform linux/amd64 \
              --build-arg GOLANG_VERSION=${GOLANG_VERSION} \
              kube-webhook-certgen/rootfs \
              --tag kube-webhook-certgen:${CERTGEN_TAG} \
              --load
            docker tag kube-webhook-certgen:${CERTGEN_TAG} \
              ghcr.io/forkline/ingress-nginx/kube-webhook-certgen:${CERTGEN_TAG}
          fi

      - name: Build controller and e2e images
        env:
          TAG: 1.0.0-dev
          ARCH: amd64
          REGISTRY: ingress-controller
        run: |
          TAGNGINX=$(cat images/nginx/TAG)
          PKG=k8s.io/ingress-nginx
          COMMIT_SHA=$(git rev-parse HEAD)
          REPO_INFO=$(git remote get-url origin)
          LDFLAGS="-buildid= -w -s"
          LDFLAGS="${LDFLAGS} -X ${PKG}/version.RELEASE=${TAG}"
          LDFLAGS="${LDFLAGS} -X ${PKG}/version.COMMIT=${COMMIT_SHA}"
          LDFLAGS="${LDFLAGS} -X ${PKG}/version.REPO=${REPO_INFO}"
          for bin in nginx-ingress-controller:cmd/nginx \
            dbg:cmd/dbg \
            wait-shutdown:cmd/waitshutdown; do
            name=${bin%:*}
            path=${bin#*:}
            mkdir -p rootfs/bin/${ARCH}
            go build -trimpath -ldflags="${LDFLAGS}" -buildvcs=false -o rootfs/bin/${ARCH}/${name} ${PKG}/${path}
          done
          docker build --no-cache \
            --build-arg BASE_IMAGE=ingress-nginx/nginx:${TAGNGINX} \
            --build-arg VERSION=${TAG} \
            --build-arg TARGETARCH=${ARCH} \
            --build-arg COMMIT_SHA=${COMMIT_SHA} \
            -t ${REGISTRY}/controller:${TAG} rootfs
          docker build --no-cache \
            --build-arg BASE_IMAGE=ingress-nginx/nginx:${TAGNGINX} \
            --build-arg VERSION=${TAG} \
            --build-arg TARGETARCH=${ARCH} \
            --build-arg COMMIT_SHA=${COMMIT_SHA} \
            -t ${REGISTRY}/controller-chroot:${TAG} rootfs \
            -f rootfs/Dockerfile-chroot
          GOFLAGS=-vet=off ginkgo build ./test/e2e
          cp test/e2e/e2e.test test/e2e-image/
          cp test/e2e/wait-for-nginx.sh test/e2e-image/
          cp -R charts test/e2e-image/ 2>/dev/null || true
          cp -R test/e2e/settings/ocsp/* test/e2e-image/ 2>/dev/null || true
          E2E_BASE_IMAGE="registry.k8s.io/ingress-nginx/e2e-test-runner:v2.2.9@sha256:6eda6a8d17ff65c5af647abb0714b882047b77d18161712d77daf5f610fd4020"
          docker build \
            --build-arg E2E_BASE_IMAGE=${E2E_BASE_IMAGE} \
            --tag nginx-ingress-controller:e2e \
            test/e2e-image
          TAGNGINX=$(cat images/nginx/TAG)
          CERTGEN_TAG=$(cat images/kube-webhook-certgen/TAG)
          docker save \
            nginx-ingress-controller:e2e \
            ingress-controller/controller:1.0.0-dev \
            ingress-controller/controller-chroot:1.0.0-dev \
            ingress-nginx/nginx:${TAGNGINX} \
            ghcr.io/forkline/ingress-nginx/kube-webhook-certgen:${CERTGEN_TAG} \
            | gzip > docker.tar.gz

      - name: Upload image cache
        uses: actions/upload-artifact@v4
        with:
          name: docker.tar.gz
          path: docker.tar.gz
          retention-days: 1

  chart-test:
    name: Chart e2e
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download image cache
        uses: actions/download-artifact@v4
        with:
          name: docker.tar.gz

      - name: Load image cache
        run: gzip --decompress --stdout docker.tar.gz | docker load

      - name: Run chart tests
        env:
          K8S_VERSION: v1.35.1
          SKIP_IMAGE_CREATION: true
        run: |
          sudo mkdir -pm 777 "${HOME}/.kube"
          make kind-e2e-chart-tests

  kubernetes:
    name: Kubernetes
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download image cache
        uses: actions/download-artifact@v4
        with:
          name: docker.tar.gz

      - name: Load image cache
        run: gzip --decompress --stdout docker.tar.gz | docker load

      - name: Install kind
        uses: helm/kind-action@v1.14.0
        with:
          version: v0.31.0
          install_only: true

      - name: Run e2e tests
        env:
          K8S_VERSION: v1.35.1
          SKIP_CLUSTER_CREATION: false
          SKIP_INGRESS_IMAGE_CREATION: true
          SKIP_E2E_IMAGE_CREATION: true
          FOCUS: ${{ inputs.focus }}
        run: make kind-e2e-test

      - name: Upload junit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports-kubernetes
          path: test/junitreports/*.xml

      - name: Generate E2E test summary
        if: always()
        run: |
          echo "## E2E Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          GS="$GITHUB_STEP_SUMMARY"
          if [ -d "test/junitreports" ] && \
            ls test/junitreports/*.xml 1>/dev/null 2>&1; then
            REPORT_COUNT=$(ls test/junitreports/*.xml 2>/dev/null | wc -l)
            echo "Found ${REPORT_COUNT} test report(s)" >> "$GS"
            for report in test/junitreports/*.xml; do
              echo "### $(basename ${report})" >> "$GS"
              TESTS=$(grep -c '<testcase' "${report}" 2>/dev/null \
                || echo "0")
              FAILURES=$(grep -c '<failure' "${report}" 2>/dev/null \
                || echo "0")
              echo "- Tests: ${TESTS}, Failures: ${FAILURES}" >> "$GS"
            done
          else
            echo "No junit reports found" >> "$GS"
          fi

  kubernetes-chroot:
    name: Kubernetes chroot
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download image cache
        uses: actions/download-artifact@v4
        with:
          name: docker.tar.gz

      - name: Load image cache
        run: gzip --decompress --stdout docker.tar.gz | docker load

      - name: Install kind
        uses: helm/kind-action@v1.14.0
        with:
          version: v0.31.0
          install_only: true

      - name: Run chroot e2e tests
        env:
          K8S_VERSION: v1.35.1
          IS_CHROOT: true
          SKIP_CLUSTER_CREATION: false
          SKIP_INGRESS_IMAGE_CREATION: true
          SKIP_E2E_IMAGE_CREATION: true
        run: make kind-e2e-test

      - name: Upload junit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports-kubernetes-chroot
          path: test/junitreports/*.xml

      - name: Generate E2E test summary
        if: always()
        run: |
          echo "## E2E Chroot Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          GS="$GITHUB_STEP_SUMMARY"
          if [ -d "test/junitreports" ] && \
            ls test/junitreports/*.xml 1>/dev/null 2>&1; then
            REPORT_COUNT=$(ls test/junitreports/*.xml 2>/dev/null | wc -l)
            echo "Found ${REPORT_COUNT} test report(s)" >> "$GS"
            for report in test/junitreports/*.xml; do
              echo "### $(basename ${report})" >> "$GS"
              TESTS=$(grep -c '<testcase' "${report}" 2>/dev/null \
                || echo "0")
              FAILURES=$(grep -c '<failure' "${report}" 2>/dev/null \
                || echo "0")
              echo "- Tests: ${TESTS}, Failures: ${FAILURES}" >> "$GS"
            done
          else
            echo "No junit reports found" >> "$GS"
          fi

  rerun-failed-jobs:
    runs-on: ubuntu-latest
    needs:
      - kubernetes
      - chart-test
    if: failure() && github.run_attempt == 1
    steps:
      - name: Rerun failed jobs in this workflow
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run retry-workflow.yaml -F run_id=${{ github.run_id }}
