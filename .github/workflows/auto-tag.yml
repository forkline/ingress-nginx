---
name: Auto tag

"on":
  push:
    branches:
      - main

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        with:
          token: ${{ secrets.PAT }}
        uses: actions/checkout@v6

      - name: Get version from CHANGELOG
        id: get_version
        run: |
          # Extract first version from CHANGELOG (date-based: vYYYY.MM.DD)
          VERSION=$(grep -oP '(?<=## \[v)[0-9]{4}\.[0-9]{2}\.[0-9]{2}(?=\])' \
            CHANGELOG.md | head -1)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        run: |
          tag=${{ steps.get_version.outputs.tag }}
          if git ls-remote --tags origin | grep -q "refs/tags/$tag"; then
            echo "Tag $tag already exists"
            echo "TAG_EXISTS=true" >> $GITHUB_ENV
          else
            echo "Tag $tag does not exist"
            echo "TAG_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Import GPG key
        if: env.TAG_EXISTS == 'false'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Create new tag
        if: env.TAG_EXISTS == 'false'
        run: |
          tag=${{ steps.get_version.outputs.tag }}
          git config --global user.name "${{ github.repository_owner }}"
          git config --global user.email \
            "${{ github.repository_owner }}@users.noreply.github.com"
          GPG_KEY=$(gpg --list-keys --with-colons | grep '^pub' | cut -d':' -f5)
          git tag -s "$tag" -m "$tag" --local-user "$GPG_KEY"
          git push origin "$tag"
