---
name: Helm

"on":
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'charts/**'
      - '.ct.yaml'
      - '.github/workflows/helm.yml'
  pull_request:
    branches: [main]
    paths:
      - 'charts/**'
      - '.ct.yaml'
      - '.github/workflows/helm.yml'

permissions:
  contents: read

concurrency:
  group: helm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and test chart
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Set up Helm Chart Testing
        uses: helm/chart-testing-action@v2.7.0
        with:
          version: 3.14.0

      - name: Set up Artifact Hub CLI
        run: |
          AH_VERSION=v1.20.0
          AH_SHA256=9027626f19ff9f3ac668f222917130ac885e289e922e1428bfd2e7f066324e31
          AH_ARCHIVE=ah_1.20.0_linux_amd64.tar.gz
          AH_URL_BASE=https://github.com/artifacthub/hub/releases/download
          curl --fail --location \
            "${AH_URL_BASE}/${AH_VERSION}/${AH_ARCHIVE}" \
            --output /tmp/ah.tar.gz
          echo "${AH_SHA256}  /tmp/ah.tar.gz" | shasum --check
          sudo tar --extract --file /tmp/ah.tar.gz --directory /usr/local/bin ah

      - name: Set up Helm Docs
        uses: gabe565/setup-helm-docs-action@v1.0.4

      - name: Install Helm Unit Test
        run: |
          helm plugin install \
            https://github.com/helm-unittest/helm-unittest \
            --version v1.0.3 \
            --verify=false

      - name: Lint chart
        run: |
          ct lint --config .ct.yaml
          ah lint --path charts/ingress-nginx

      - name: Verify chart docs
        run: |
          helm-docs --chart-search-root charts
          git diff --exit-code charts/ingress-nginx/README.md

      - name: Run helm unit tests
        run: make helm-test

  release:
    name: Publish OCI chart
    runs-on: ubuntu-latest
    needs: lint
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package chart
        run: helm package charts/ingress-nginx --destination .dist

      - name: Publish chart
        run: |
          helm push .dist/ingress-nginx-*.tgz \
            oci://ghcr.io/forkline/helm-charts
