suite: ClusterRoleBinding
templates:
  - clusterrolebinding.yaml

tests:
  - it: should not create a ClusterRoleBinding if `rbac.create` is false
    set:
      rbac.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create a ClusterRoleBinding if `rbac.scope` is true
    set:
      rbac.create: true
      rbac.scope: true
      controller.scope.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should create a ClusterRoleBinding with default values
    set:
      rbac.create: true
      rbac.scope: false
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: metadata.name
          value: RELEASE-NAME-ingress-nginx
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.name
          value: RELEASE-NAME-ingress-nginx
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - equal:
          path: subjects[0].name
          value: RELEASE-NAME-ingress-nginx

  - it: should create a ClusterRoleBinding with custom service account name
    set:
      rbac.create: true
      rbac.scope: false
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: subjects[0].name
          value: custom-sa
