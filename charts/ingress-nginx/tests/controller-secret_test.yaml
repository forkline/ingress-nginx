suite: Controller > Secret
templates:
  - controller-secret.yaml

tests:
  - it: should not create a Secret if `dhParam` is not set
    set:
      dhParam: ""
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create a Secret if `dhParam` is null
    set:
      dhParam: null
    asserts:
      - hasDocuments:
          count: 0

  - it: should create a Secret if `dhParam` is set
    set:
      dhParam: LS0tLS1CRUdJTiBESCBQQVJBTUVURVJTLS0tLS0=
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-ingress-nginx-controller
      - equal:
          path: data.dhparam\.pem
          value: LS0tLS1CRUdJTiBESCBQQVJBTUVURVJTLS0tLS0=
