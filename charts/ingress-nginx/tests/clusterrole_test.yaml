suite: ClusterRole
templates:
  - clusterrole.yaml

tests:
  - it: should not create a ClusterRole if `rbac.create` is false
    set:
      rbac.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create a ClusterRole if `rbac.scope` is true
    set:
      rbac.create: true
      rbac.scope: true
      controller.scope.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should create a ClusterRole with default values
    set:
      rbac.create: true
      rbac.scope: false
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ClusterRole
      - equal:
          path: metadata.name
          value: RELEASE-NAME-ingress-nginx

  - it: should include namespaces in configmaps/endpoints/nodes/pods/secrets rule when scope is disabled
    set:
      rbac.create: true
      rbac.scope: false
      controller.scope.enabled: false
    asserts:
      - contains:
          path: rules[0].resources
          content: namespaces

  - it: should not include namespaces in configmaps/endpoints/nodes/pods/secrets rule when scope is enabled
    set:
      rbac.create: true
      rbac.scope: false
      controller.scope.enabled: true
    asserts:
      - notContains:
          path: rules[0].resources
          content: namespaces
